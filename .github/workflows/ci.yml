name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/app --max-line-length=100 --ignore=E501,W503

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v
